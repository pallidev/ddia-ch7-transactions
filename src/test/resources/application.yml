# 테스트 전용 설정.
# main 의 application.properties(운영 MySQL)는 건드리지 않고,
# 테스트에서는 별도 설치 없이 H2 를 MySQL 호환 모드로 사용한다.
spring:
  datasource:
    url: "jdbc:h2:mem:txstudy;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    # 트랜잭션/격리수준 관찰을 위해 JDBC 바인딩 파라미터를 찍는다
    org.hibernate.orm.jdbc.bind: trace
